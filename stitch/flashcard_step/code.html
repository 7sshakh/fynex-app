<!DOCTYPE html>

<html class="dark" lang="uz"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface-variant": "#adaaaa",
                    "tertiary": "#ff734a",
                    "inverse-surface": "#fcf8f8",
                    "surface-container-highest": "#262626",
                    "on-tertiary-fixed-variant": "#6f1a00",
                    "on-error-container": "#ffd2c8",
                    "on-background": "#ffffff",
                    "surface-variant": "#262626",
                    "secondary-dim": "#cfd9aa",
                    "surface": "#0e0e0e",
                    "primary-container": "#b2ed12",
                    "on-secondary-fixed-variant": "#565f39",
                    "primary-fixed": "#c3ff2d",
                    "on-tertiary": "#430c00",
                    "on-primary-container": "#3d5400",
                    "inverse-primary": "#4c6800",
                    "secondary": "#dde8b7",
                    "secondary-container": "#424a26",
                    "on-surface": "#ffffff",
                    "surface-container-low": "#131313",
                    "surface-tint": "#c3ff2d",
                    "tertiary-container": "#ff5722",
                    "on-tertiary-container": "#250400",
                    "error-container": "#b92902",
                    "on-secondary-container": "#cbd5a6",
                    "background": "#0e0e0e",
                    "on-primary-fixed-variant": "#4e6a00",
                    "primary-dim": "#b5f018",
                    "tertiary-fixed": "#ff9475",
                    "tertiary-dim": "#ff734a",
                    "on-secondary-fixed": "#3a4320",
                    "on-primary": "#455f00",
                    "secondary-fixed-dim": "#cfd9aa",
                    "on-primary-fixed": "#364b00",
                    "surface-dim": "#0e0e0e",
                    "outline-variant": "#494847",
                    "error-dim": "#d53d18",
                    "on-tertiary-fixed": "#340800",
                    "primary": "#c3ff2d",
                    "inverse-on-surface": "#565554",
                    "error": "#ff7351",
                    "on-error": "#450900",
                    "surface-container": "#1a1919",
                    "surface-bright": "#2c2c2c",
                    "on-secondary": "#4d5630",
                    "surface-container-high": "#201f1f",
                    "surface-container-lowest": "#000000",
                    "primary-fixed-dim": "#b5f018",
                    "outline": "#777575",

            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; background-color: #0e0e0e; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(26, 25, 25, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .neon-glow {
            filter: blur(80px);
            opacity: 0.15;
            background: #c3ff2d;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-[#0e0e0e]/60 backdrop-blur-xl flex items-center justify-between px-6 h-16 w-full max-w-none shadow-[0_40px_60px_-5px_rgba(195,255,46,0.12)]">
<div class="flex items-center gap-4">
<button class="text-[#c3ff2e] active:scale-95 transition-transform duration-200 ease-out hover:bg-[#2c2c2c] p-2 rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-black text-[#c3ff2e] font-['Inter'] tracking-[-0.04em] uppercase">Dasturlash Asoslari</h1>
</div>
<!-- Progress Indicator -->
<div class="flex flex-col items-end gap-1">
<span class="text-[10px] font-black uppercase tracking-wider text-[#c3ff2e]/80">Progress 20%</span>
<div class="w-32 h-1.5 bg-surface-container-highest rounded-full overflow-hidden">
<div class="w-1/5 h-full bg-primary shadow-[0_0_10px_rgba(195,255,46,0.5)]"></div>
</div>
</div>
<div class="flex items-center gap-2">
<span class="text-sm font-black text-[#c3ff2e] px-3 py-1 bg-surface-container rounded-full">150 XP</span>
</div>
</header>
<!-- Main Learning Canvas -->
<main class="flex-1 relative flex flex-col items-center justify-center p-6 mt-16">
<!-- Background Neon Blobs (The Pulse) -->
<div class="absolute top-1/4 left-1/4 w-64 h-64 neon-glow rounded-full"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 neon-glow rounded-full"></div>
<!-- Flashcard Title Section -->
<div class="text-center mb-8 z-10">
<h2 class="text-on-surface-variant font-semibold tracking-wide uppercase text-xs mb-2">Hozirgi mavzu</h2>
<p class="text-2xl font-black tracking-tight">Flashcard: Yangi so'zlar</p>
</div>
<!-- The Flashcard (Hero Element) -->
<div class="relative w-full max-w-md aspect-[3/4] z-10 group cursor-pointer active:scale-[0.98] transition-all duration-300">
<!-- Ghost Border Fallback -->
<div class="absolute inset-0 rounded-lg outline outline-1 outline-outline-variant/15 -z-10"></div>
<!-- Card Body -->
<div class="glass-card w-full h-full rounded-lg flex flex-col items-center justify-between p-12 text-center relative overflow-hidden">
<!-- Card Index -->
<div class="text-primary/40 font-black text-sm tracking-widest uppercase">Karta 1 / 5</div>
<!-- Word Section -->
<div class="space-y-4">
<h3 class="text-4xl md:text-5xl font-black text-on-surface tracking-[-0.04em]">O'zgaruvchi</h3>
<p class="text-on-surface-variant font-medium text-lg">Talaffuz: <span class="text-secondary">[O'z-ga-ruv-chi]</span></p>
</div>
<!-- Footer Hint -->
<div class="flex flex-col items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary animate-pulse">
<span class="material-symbols-outlined">touch_app</span>
</div>
<p class="text-sm font-semibold text-on-surface-variant/80">Tarjimani ko'rish uchun bosing</p>
</div>
<!-- Subtle Decorative Element -->
<div class="absolute -bottom-12 -right-12 w-32 h-32 bg-primary/10 rounded-full blur-3xl"></div>
</div>
<!-- Card Stack Effect (Visual Depth) -->
<div class="absolute inset-0 bg-surface-container translate-y-4 scale-95 -z-20 rounded-lg opacity-40"></div>
<div class="absolute inset-0 bg-surface-container-low translate-y-8 scale-90 -z-30 rounded-lg opacity-20"></div>
</div>
<!-- Action Controls -->
<div class="mt-12 flex items-center gap-6 z-10">
<button class="w-14 h-14 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center hover:bg-surface-bright transition-colors active:scale-90">
<span class="material-symbols-outlined">close</span>
</button>
<button class="px-8 py-4 bg-primary text-on-primary rounded-xl font-black text-lg shadow-[0_0_40px_-5px_rgba(195,255,46,0.3)] active:scale-95 transition-all flex items-center gap-3">
                Keyingi so'z
                <span class="material-symbols-outlined">navigate_next</span>
</button>
<button class="w-14 h-14 rounded-full bg-surface-container-highest text-primary flex items-center justify-center hover:bg-surface-bright transition-colors active:scale-90">
<span class="material-symbols-outlined">volume_up</span>
</button>
</div>
</main>
<!-- Bottom Nav Suppressed per Instruction -->
</body></html>
