<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar from Shared Components JSON -->
<header class="fixed top-0 w-full z-50 bg-[#0e0e0e]/60 backdrop-blur-xl shadow-[0_40px_60px_-5px_rgba(195,255,46,0.12)]">

<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform duration-200 ease-out text-[#c3ff2e]">

</button>
<h1 class="text-lg font-black text-[#c3ff2e] font-['Inter'] tracking-[-0.04em] uppercase">Dasturlash Asoslari</h1>
</div>
<div class="flex items-center gap-3">
<span class="px-3 py-1 rounded-full bg-surface-container-highest text-[#c3ff2e] font-black text-sm">150 XP</span>
</div>
</div>
<!-- Progress Bar (The Tonal Shift Logic) -->
<div class="w-full h-1.5 bg-surface-container-low overflow-hidden">
<div class="h-full bg-primary w-[60%] shadow-[0_0_15px_rgba(195,255,46,0.6)] transition-all duration-500"></div>
</div>
</header>
<main class="flex-grow pt-24 pb-8 px-6 max-w-2xl mx-auto w-full flex flex-col">

<div class="mb-10">

</div>
<p class="text-on-surface-variant text-sm font-medium">To'g'ri so'zni tanlab, gapni yakunlang.</p>
</div>
<!-- Content Canvas -->
<div class="flex-grow flex flex-col justify-center gap-12">
<!-- Sentence Plate -->
<div class="bg-surface-container p-8 rounded-lg relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-primary"></div>
<p class="text-2xl md:text-3xl font-semibold leading-relaxed text-on-surface">
                    O'zgaruvchi nomi har doim 
                    <span class="inline-flex items-center justify-center min-w-[120px] h-12 mx-2 px-4 rounded-xl border-b-4 border-primary bg-surface-container-highest text-primary-fixed-dim font-black animate-pulse">
                        ____
                    </span> 
                    bilan boshlanishi kerak.
                </p>
</div>
<!-- Options Grid (2x2) -->
<div class="grid grid-cols-2 gap-4">
<button class="bg-surface-container hover:bg-surface-bright active:scale-95 transition-all duration-300 py-6 px-4 rounded-lg flex items-center justify-center group relative overflow-hidden">
<span class="text-xl font-bold group-hover:text-primary transition-colors">son</span>
</button>
<button class="bg-surface-container hover:bg-surface-bright active:scale-95 transition-all duration-300 py-6 px-4 rounded-lg flex items-center justify-center group relative overflow-hidden">
<span class="text-xl font-bold group-hover:text-primary transition-colors">belgi</span>
</button>
<!-- Selected State Simulated -->
<button class="bg-primary text-on-primary active:scale-95 transition-all duration-300 py-6 px-4 rounded-lg flex items-center justify-center shadow-[0_10px_30px_-5px_rgba(195,255,46,0.3)]">
<span class="text-xl font-black">harf</span>
</button>
<button class="bg-surface-container hover:bg-surface-bright active:scale-95 transition-all duration-300 py-6 px-4 rounded-lg flex items-center justify-center group relative overflow-hidden">

</button>
</div>
</div>

<div class="mt-12 space-y-6">
<!-- Hint Plate -->
<div class="bg-surface-container-low p-5 rounded-lg border-l-4 border-tertiary flex gap-4 items-start">
<div class="p-2 bg-tertiary/10 rounded-lg">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
</div>
<div>
<h4 class="text-tertiary font-bold text-sm uppercase tracking-wider mb-1">Maslahat</h4>
<p class="text-on-surface-variant text-sm leading-snug">Raqamlar bilan o'zgaruvchi nomini boshlash sintaktik xatolikka olib keladi.</p>
</div>
</div>

<button class="w-full bg-primary text-on-primary py-5 rounded-xl font-black text-lg tracking-tight shadow-[0_20px_40px_-10px_rgba(195,255,46,0.4)] active:scale-[0.98] transition-transform">

<div class="fixed -bottom-32 -left-32 w-64 h-64 bg-primary/10 blur-[100px] pointer-events-none"></div>
