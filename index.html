<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Primary Meta Tags -->
    <title>Fynex 3.0 - Bepul Ta'lim Platformasi</title>
    <meta name="title" content="Fynex 3.0 - Bepul Ta'lim Platformasi" />
    <meta name="description" content="Ingliz tili, rus tili, matematika, fizika va dasturlashni bepul o'rganing" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#0e0e0e" />
    <meta name="msapplication-navbutton-color" content="#0e0e0e" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- iOS Add to Homescreen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Fynex" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Fynex" />
    <meta name="display" content="standalone" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }
      * {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      html {
        -webkit-text-size-adjust: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: var(--fynex-app-bg, #0e0e0e);
        height: 100%;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--fynex-app-bg, #0e0e0e);
        overflow: hidden;
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
      }
      body {
        min-height: 100vh;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
      }
      #root {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        overflow: hidden;
        background-color: var(--fynex-app-bg, #0e0e0e);
      }
      
      /* Hide scrollbar for iOS */
      ::-webkit-scrollbar {
        display: none;
      }
      
      /* Loading screen */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0e0e0e;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      
      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-logo {
        width: 80px;
        height: 80px;
        position: relative;
        background: rgba(193, 255, 46, 0.08);
        backdrop-filter: blur(20px);
        border-radius: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(193, 255, 46, 0.14);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.35);
        animation: pulse 2s ease-in-out infinite;
      }

      .loading-logo::before {
        content: "";
        position: absolute;
        inset: 12px;
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(193, 255, 46, 0.2), rgba(193, 255, 46, 0.03));
        opacity: 0.9;
      }

      .loading-logo-mark {
        position: relative;
        width: 44px;
        height: 44px;
      }

      .loading-logo-mark::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 14px 22px 14px 14px;
        background: linear-gradient(180deg, #dbff61 0%, #c3ff2e 55%, #9fdc16 100%);
        clip-path: polygon(20% 0%, 82% 0%, 60% 44%, 78% 44%, 56% 100%, 0% 100%, 26% 42%, 8% 42%);
        box-shadow: 0 10px 24px rgba(193, 255, 46, 0.22);
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
      
      .loading-dots {
        display: flex;
        gap: 8px;
        margin-top: 24px;
      }
      
      .loading-dots span {
        width: 8px;
        height: 8px;
        background: rgba(193, 255, 46, 0.9);
        border-radius: 50%;
        animation: bounce 1.4s ease-in-out infinite;
      }
      
      .loading-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      
      .loading-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      
      @keyframes bounce {
        0%, 80%, 100% { transform: scale(1); opacity: 0.5; }
        40% { transform: scale(1.5); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loading-logo">
        <div class="loading-logo-mark"></div>
      </div>
      <p style="color: #eff6d4; margin-top: 16px; font-weight: 600; letter-spacing: 0.02em;">Fynex 3.0</p>
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide loading screen when app loads
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('hidden');
            setTimeout(function() {
              loadingScreen.style.display = 'none';
            }, 500);
          }
        }, 1500);
      });
    </script>
  </body>
</html>
